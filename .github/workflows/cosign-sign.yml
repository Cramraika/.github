# Reusable image build + Cosign sign + SBOM attest. Per ADR-041.
#
#   jobs:
#     sign:
#       uses: Cramraika/.github/.github/workflows/cosign-sign.yml@main
#       secrets: inherit     # needs COSIGN_PRIVATE_KEY + COSIGN_PASSWORD in the CALLER repo
#       with:
#         runner: ${{ vars.RUNNER_TYPE || 'ubuntu-latest' }}
#
# Caller trigger is typically: on: push: tags: ['v*'] + workflow_dispatch.
# Public verification key:
#   https://gist.githubusercontent.com/Cramraika/c246bdb779518a588617839bfe2a75c1/raw/cosign.pub
name: Reusable Cosign Sign

on:
  workflow_call:
    inputs:
      runner:
        description: "Runner label."
        required: false
        type: string
        default: ubuntu-latest
    secrets:
      COSIGN_PRIVATE_KEY:
        description: "base64 cosign private key."
        required: true
      COSIGN_PASSWORD:
        description: "cosign key passphrase."
        required: true

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build-sign-push:
    runs-on: ${{ inputs.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Lowercase image repo
        run: echo "IMAGE_REPO_LOWER=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.IMAGE_REPO_LOWER }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,format=short

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image with key
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          set -euo pipefail
          for tag in $(echo "${{ steps.meta.outputs.tags }}" | tr ',' ' '); do
            echo "Signing $tag@${{ steps.build.outputs.digest }}"
            cosign sign --yes --key env://COSIGN_PRIVATE_KEY \
              "$tag@${{ steps.build.outputs.digest }}"
          done

      - name: Generate SBOM (syft, CycloneDX — fleet-canonical)
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/${{ env.IMAGE_REPO_LOWER }}@${{ steps.build.outputs.digest }}
          format: cyclonedx-json
          output-file: sbom.cdx.json

      - name: Attach SBOM to image
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          cosign attest --yes --key env://COSIGN_PRIVATE_KEY \
            --predicate sbom.cdx.json --type cyclonedx \
            "ghcr.io/${{ env.IMAGE_REPO_LOWER }}@${{ steps.build.outputs.digest }}"

      - name: Verify signature (smoke test)
        run: |
          cosign verify \
            --key https://gist.githubusercontent.com/Cramraika/c246bdb779518a588617839bfe2a75c1/raw/cosign.pub \
            "ghcr.io/${{ env.IMAGE_REPO_LOWER }}@${{ steps.build.outputs.digest }}"
