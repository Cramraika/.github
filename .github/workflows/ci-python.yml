# Reusable Python CI — call from a thin per-repo caller:
#
#   jobs:
#     ci:
#       uses: Cramraika/.github/.github/workflows/ci-python.yml@main
#       with:
#         runner: ${{ vars.RUNNER_TYPE || 'ubuntu-latest' }}
#         python-version: "3.11"
#         docker-build: false            # set true to add a no-push docker build smoke
#       secrets: inherit                 # only needed if the repo's steps consume secrets
#
# Preserves the project-template ci-python lint behavior (flake8 E9/F63/F7 fatal-error
# subset). Adds pip-audit (advisory) + an optional no-push docker build smoke.
name: Reusable Python CI

on:
  workflow_call:
    inputs:
      runner:
        description: "Runner label (caller resolves vars.RUNNER_TYPE || 'ubuntu-latest')."
        required: false
        type: string
        default: ubuntu-latest
      python-version:
        description: "Python version."
        required: false
        type: string
        default: "3.11"
      docker-build:
        description: "Run a no-push docker build smoke if a Dockerfile exists."
        required: false
        type: boolean
        default: false

jobs:
  ci:
    name: Python CI
    runs-on: ${{ inputs.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pip-audit
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f pyproject.toml ] && [ ! -f requirements.txt ]; then pip install -e . 2>/dev/null || true; fi

      - name: Lint (flake8 — fatal-error subset)
        # E9 (syntax), F63 (invalid comparisons), F7 (break/return misuse),
        # F82 (undefined name) — the fleet fatal-error subset.
        run: flake8 . --max-line-length=120 --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Security audit (pip-audit, advisory)
        continue-on-error: true
        run: pip-audit 2>&1 | tail -40 || true

      - name: Docker build smoke (no push)
        if: ${{ inputs.docker-build }}
        run: |
          if [ -f Dockerfile ]; then
            docker build -t ci-smoke:${{ github.sha }} .
          else
            echo "No Dockerfile — skipping docker build smoke."
          fi
