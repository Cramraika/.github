# Reusable self-hosted Renovate runner (workflow shape ONLY).
#
# OWNERSHIP BOUNDARY: this file (the workflow .yml) is owned by the CI/CD
# reusable-workflow library. The renovate.json config + Renovate features
# (presets, package rules, schedules-in-config) are owned by the "Renovate
# full-leverage" track. Coordinate via the App-token convention below.
#
#   jobs:
#     renovate:
#       uses: Cramraika/.github/.github/workflows/renovate.yml@main
#       secrets: inherit       # needs RENOVATE_APP_ID + RENOVATE_APP_PRIVATE_KEY in the CALLER repo
#       with:
#         log-level: info
#
# Caller trigger is typically:
#   on:
#     schedule: [{ cron: '0 22 * * 0' }]   # Mon 03:30 IST = Sun 22:00 UTC
#     workflow_dispatch: { inputs: { logLevel: ... } }
#
# Self-hosted via GitHub Actions (no GitHub App *installation* needed); the
# vagary-renovate App token is minted in-workflow so PRs are authored by the App.
name: Reusable Renovate

on:
  workflow_call:
    inputs:
      log-level:
        description: "Renovate log level (info | debug)."
        required: false
        type: string
        default: info
      config-file:
        description: "Renovate config file in the caller repo."
        required: false
        type: string
        default: renovate.json
    secrets:
      RENOVATE_APP_ID:
        description: "vagary-renovate GitHub App ID."
        required: true
      RENOVATE_APP_PRIVATE_KEY:
        description: "vagary-renovate GitHub App private key."
        required: true

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate vagary-renovate App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.RENOVATE_APP_ID }}
          private-key: ${{ secrets.RENOVATE_APP_PRIVATE_KEY }}

      - name: Self-hosted Renovate
        uses: renovatebot/github-action@v42.0.9
        with:
          configurationFile: ${{ inputs.config-file }}
          token: ${{ steps.app-token.outputs.token }}
        env:
          LOG_LEVEL: ${{ inputs.log-level }}
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          RENOVATE_ONBOARDING: "false"
          RENOVATE_REQUIRE_CONFIG: "ignored"
          RENOVATE_PLATFORM: github
          RENOVATE_GIT_AUTHOR: "Renovate Bot <bot@renovate.com>"
